<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            font-family: system-ui, sans-serif;
            color: #fff;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 40px;
            color: #fff;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .game-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }
        .game-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        .game-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .game-name {
            font-size: 16px;
            font-weight: 500;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Back to Home</a>
    <h1>🎮 Flash Games</h1>
    <div class="games-grid">
        <a href="/games/mt/" class="game-card">
            <div class="game-icon">🗼</div>
            <div class="game-name">MT</div>
        </a>
        <a href="/tower/" class="game-card">
            <div class="game-icon">🏰</div>
            <div class="game-name">魔塔</div>
        </a>
    </div>
</body>
</html>
